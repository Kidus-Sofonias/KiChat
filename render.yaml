services:
  - type: web
    name: kichat-api
    runtime: node
    rootDir: Backend
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kichat-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kichat-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: kichat-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOW_NULL_ORIGIN
        value: "true"
      - key: ALLOW_ALL_ORIGINS
        value: "true"
      - key: DB_SSL
        value: "true"
      - key: DB_CONNECT_TIMEOUT_MS
        value: "50000"
      - key: DB_POOL_ACQUIRE_MS
        value: "50000"
      - key: DB_SYNC_ALTER
        value: "true"
      - key: DB_INIT_RETRIES
        value: "3"
      - key: DB_INIT_RETRY_DELAY_MS
        value: "1000"
      # ⚠️  CRITICAL: These must be set in the Render Dashboard for file uploads to work!
      # Without Cloudinary, files are stored locally on Render's EPHEMERAL filesystem
      # and will be LOST on every server restart (after ~15 min of inactivity).
      #
      # MANUAL STEP REQUIRED:
      # 1. Go to https://dashboard.render.com → kichat-api → Environment
      # 2. Add these 3 variables with your Cloudinary credentials:
      #    CLOUDINARY_CLOUD_NAME = df3rkym2v
      #    CLOUDINARY_API_KEY    = 571329382843895
      #    CLOUDINARY_API_SECRET = 1HmN5xeKsjcLt-T9IiJte2ePAQE
      # 3. Click "Save Changes" and redeploy
      #
      # Get your credentials from: https://cloudinary.com/console
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: kichat-web
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kichat-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: kichat-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: kichat-db
    plan: free
    region: frankfurt
    databaseName: kichat
