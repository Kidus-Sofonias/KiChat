services:
  - type: web
    name: kichat-api
    runtime: node
    rootDir: Backend
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kichat-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kichat-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_SSL
        value: "true"
      - key: DB_CONNECT_TIMEOUT_MS
        value: "30000"
      - key: DB_POOL_ACQUIRE_MS
        value: "30000"
      - key: DB_SYNC_ALTER
        value: "true"
      - key: DB_INIT_RETRIES
        value: "3"
      - key: DB_INIT_RETRY_DELAY_MS
        value: "2000"

  - type: web
    name: kichat-web
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kichat-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: kichat-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: kichat-db
    plan: free
    region: frankfurt
    databaseName: kichat
